{% extends 'bakeryapp/base.html' %}
{% load static %}

{% block content %}

<style>

body{
    background:#faf4ec;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1200px;
    width:90%;
    margin:50px auto;
}

.container h1{
    text-align:center;
    color:#d97c30;
    margin-bottom:40px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

.card{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 12px rgba(0,0,0,.15);
    text-align:center;
    transition:.3s;
    padding-bottom:20px;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    margin:15px 0 5px;
    color:#444;
}

.card p{
    color:#d97c30;
    font-size:22px;
    font-weight:bold;
}

.wishlist-btn{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:#ff4d6d;
    color:white;
    font-size:24px;
    cursor:pointer;
    margin-top:15px;
}

.wishlist-btn:hover{
    background:#e63956;
}

</style>

<div class="container">

<h1>Wishlist</h1>

<div class="product-grid">

    <!-- Product 1 -->
    <div class="card">
        <img src="{% static 'images/c1.jpg' %}">
        <h3>Chocolate Cake</h3>
        <p>₹400</p>

        <button class="wishlist-btn"
        data-name="Chocolate Cake"
        data-price="400"
        data-image="{% static 'images/c1.jpg' %}"
        onclick="addToWishlist(this)">
        ❤
        </button>

    </div>

    <!-- Product 2 -->
    <div class="card">
        <img src="{% static 'images/c2.jpg' %}">
        <h3>Strawberry Cake</h3>
        <p>₹500</p>

        <button class="wishlist-btn"
        data-name="Strawberry Cake"
        data-price="500"
        data-image="{% static 'images/c2.jpg' %}"
        onclick="addToWishlist(this)">
        ❤
        </button>

    </div>

    <!-- Product 3 -->
    <div class="card">
        <img src="{% static 'images/c3.png' %}">
        <h3>Black Forest Cake</h3>
        <p>₹450</p>

        <button class="wishlist-btn"
        data-name="Black Forest Cake"
        data-price="450"
        data-image="{% static 'images/c3.png' %}"
        onclick="addToWishlist(this)">
        ❤
        </button>

    </div>

</div>

</div>

<script>

function addToWishlist(button){

    let name = button.dataset.name;
    let price = Number(button.dataset.price);
    let image = button.dataset.image;

    let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

    let item = wishlist.find(product => product.name === name);

    if(!item){

        wishlist.push({
            name:name,
            price:price,
            image:image
        });

        localStorage.setItem("wishlist", JSON.stringify(wishlist));

        updateWishlistCount();

        alert(name + " added to Wishlist!");

    }else{

        alert(name + " is already in Wishlist!");

    }

}

</script>

{% endblock %}
