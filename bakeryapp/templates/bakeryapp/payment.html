{% extends 'bakeryapp/base.html' %}

{% block content %}

<style>

.payment-container{

    max-width:650px;
    margin:80px auto;
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);

}

.payment-container h1{

    text-align:center;
    color:#d97c30;
    margin-bottom:30px;

}

.details{

    font-size:22px;
    line-height:2;
}

.pay-btn{

    width:100%;
    margin-top:35px;
    padding:15px;
    background:#ffd233;
    border:none;
    border-radius:30px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;

}

.pay-btn:hover{

    background:#f4c000;

}

</style>

<div class="payment-container">

    <h1>Payment Summary</h1>

    <div class="details">

        <p><b>Product :</b> Choco Delight Cake</p>

        <p><b>Weight :</b> {{ weight }}</p>

        <p><b>Total Amount :</b> ₹{{ amount }}</p>

    </div>

    <button id="rzp-button" class="pay-btn">

        PAY ₹{{ amount }}

    </button>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

var options = {

    key:"{{ razorpay_key }}",

    amount:"{{ order.amount }}",

    currency:"INR",

    name:"Cherii Bakes",

    description:"Cake Order",

    image:"",

    order_id:"{{ order.id }}",

    handler:function(response){

        alert("Payment Successful");

        window.location.href="{% url 'home' %}";

    },

    prefill:{

        name:"Customer",

        email:"",

        contact:""

    },

    theme:{
        color:"#d97c30"
    }

};

var rzp = new Razorpay(options);

document.getElementById("rzp-button").onclick=function(e){

    rzp.open();

    e.preventDefault();

}

</script>

{% endblock %}
