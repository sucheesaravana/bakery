{% extends 'bakeryapp/base.html' %}
{% load static %}

{% block content %}
<style>

body{
    background:#faf4ec;
}

.sweet-container{
    max-width:1400px;
    margin:60px auto;
    padding:20px;
}

.sweet-container h1{
    text-align:center;
    color:#d97c30;
    font-size:42px;
    margin-bottom:45px;
}

.sweet-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

.sweet-card{
    text-decoration:none;
    color:#000;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    transition:.3s;
    display:block;
}

.sweet-card:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 25px rgba(0,0,0,0.18);
}

.sweet-image{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
}

.sweet-content{
    background:#f6e7ae;
    text-align:center;
    padding:18px;
}

.sweet-content h3{
    font-size:28px;
    margin-bottom:8px;
}

.sweet-content p{
    font-size:22px;
    color:#333;
    font-weight:bold;
}

@media(max-width:992px){

.sweet-grid{
    grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:768px){

.sweet-grid{
    grid-template-columns:1fr;
}

}

</style>

<div class="sweet-container">

    <h1>Sweet Products</h1>

    <div class="sweet-grid">

        <!-- Gulab Jamun -->
        <a href="{% url 'checkout' %}" class="sweet-card">
            <img src="{% static 'images/s1.webp' %}" class="sweet-image" alt="Gulab Jamun">
            <div class="sweet-content">
                <h3>GULAB JAMUN</h3>
                <p>FROM: Rs.180</p>
            </div>
        </a>

        <!-- Rasgulla -->
        <a href="{% url 'checkout' %}" class="sweet-card">
            <img src="{% static 'images/s2.webp' %}" class="sweet-image" alt="Rasgulla">
            <div class="sweet-content">
                <h3>RASGULLA</h3>
                <p>FROM: Rs.200</p>
            </div>
        </a>

        <!-- Kaju Katli -->
        <a href="{% url 'checkout' %}" class="sweet-card">
            <img src="{% static 'images/s3.webp' %}" class="sweet-image" alt="Kaju Katli">
            <div class="sweet-content">
                <h3>KAJU KATLI</h3>
                <p>FROM: Rs.350</p>
            </div>
        </a>

        <!-- Laddu -->
        <a href="{% url 'checkout' %}" class="sweet-card">
            <img src="{% static 'images/s4.webp' %}" class="sweet-image" alt="Laddu">
            <div class="sweet-content">
                <h3>LADDU</h3>
                <p>FROM: Rs.220</p>
            </div>
        </a>

        <!-- Mysore Pak -->
        <a href="{% url 'checkout' %}" class="sweet-card">
            <img src="{% static 'images/s5.webp' %}" class="sweet-image" alt="Mysore Pak">
            <div class="sweet-content">
                <h3>MYSORE PAK</h3>
                <p>FROM: Rs.300</p>
            </div>
        </a>

        <!-- Soan Papdi -->
        <a href="{% url 'checkout' %}" class="sweet-card">
            <img src="{% static 'images/s6.webp' %}" class="sweet-image" alt="Soan Papdi">
            <div class="sweet-content">
                <h3>SOAN PAPDI</h3>
                <p>FROM: Rs.250</p>
            </div>
        </a>

    </div>

</div>
{% endblock %}
