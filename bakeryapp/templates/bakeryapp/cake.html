{% extends 'bakeryapp/base.html' %}
{% load static %}

{% block content %}

<style>

body{
    background:#faf4ec;
}

.container{
    max-width:1400px;
    margin:60px auto;
    padding:20px;
}

.container h1{
    text-align:center;
    color:#d97c30;
    font-size:42px;
    margin-bottom:45px;
}

.cake-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

.checkout{
    text-decoration:none;
    color:#000;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    transition:.3s;
    display:block;
}

.checkout:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 25px rgba(0,0,0,0.18);
}

.product-image-cake{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
}

.product-content-cake{
    background:#f6e7ae;
    text-align:center;
    padding:18px;
}

.product-content-cake h3{
    font-size:28px;
    margin-bottom:8px;
}

.product-content-cake p{
    font-size:22px;
    color:#333;
    font-weight:bold;
}

@media(max-width:992px){

.cake-grid{
    grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:768px){

.cake-grid{
    grid-template-columns:1fr;
}

}

</style>

<div class="container">

    <h1>Cake Products</h1>

    <div class="cake-grid">

        <!-- Black Forest -->
        <a href="{% url 'checkout' %}" class="checkout">
            <img src="{% static 'images/c1.jpg' %}" class="product-image-cake" alt="Black Forest Cake">
            <div class="product-content-cake">
                <h3>BLACK FOREST</h3>
                <p>FROM: Rs.400</p>
            </div>
        </a>

        <!-- Chocolate Cake -->
        <a href="{% url 'checkout' %}" class="checkout">
            <img src="{% static 'images/c2.jpg' %}" class="product-image-cake" alt="Chocolate Cake">
            <div class="product-content-cake">
                <h3>CHOCOLATE CAKE</h3>
                <p>FROM: Rs.700</p>
            </div>
        </a>

        <!-- Red Velvet Cake -->
        <a href="{% url 'checkout' %}" class="checkout">
            <img src="{% static 'images/c3.png' %}" class="product-image-cake" alt="Red Velvet Cake">
            <div class="product-content-cake">
                <h3>RED VELVET CAKE</h3>
                <p>FROM: Rs.800</p>
            </div>
        </a>

        <!-- Vanilla Sponge Cake -->
        <a href="{% url 'checkout' %}" class="checkout">
            <img src="{% static 'images/a18.png' %}" class="product-image-cake" alt="Vanilla Sponge Cake">
            <div class="product-content-cake">
                <h3>RAINBOW CAKE</h3>
                <p>FROM: Rs.550</p>
            </div>
        </a>

        <!-- Butterscotch Cake -->
        <a href="{% url 'checkout' %}" class="checkout">
            <img src="{% static 'images/a19.png' %}" class="product-image-cake" alt="Butterscotch Cake">
            <div class="product-content-cake">
                <h3>RASAMALAI CAKE</h3>
                <p>FROM: Rs.750</p>
            </div>
        </a>

    </div>

</div>

{% endblock %}
